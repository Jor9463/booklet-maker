<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Booklet Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%230000FF' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-white text-[#0000FF] flex items-center justify-center min-h-screen">

    <div class="border border-[#0000FF] w-full max-w-lg p-6 sm:p-10 space-y-8 rounded-none">
        
        <!-- Header -->
        <div class="text-center">
            <div class="flex items-center justify-center">
                <svg class="w-8 h-8 sm:w-9 sm:h-9 inline-block mr-3 text-[#0000FF]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <h1 class="text-3xl sm:text-4xl font-bold">Booklet Maker</h1>
            </div>
            <p class="mt-3 text-sm sm:text-base max-w-md mx-auto opacity-80">
                This tool rearranges your PDF pages into the correct order for printing and folding. It creates ready-to-print booklets directly in your browser.
            </p>
        </div>

        <!-- File Input -->
        <div id="file-input-section">
            <label for="pdf-file" id="file-drop-label" class="border border-dashed border-[#0000FF] w-full flex flex-col items-center justify-center p-8 sm:p-12 cursor-pointer hover:bg-blue-50 transition-colors rounded-none">
                <svg class="w-12 h-12 text-[#0000FF] mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M12 15l-4-4m0 0l4-4m-4 4h12"></path></svg>
                <span class="text-lg font-medium">Drag & Drop PDF Here</span>
                <span class="mt-1 text-sm opacity-60">or click to select file</span>
                <input type='file' id="pdf-file" class="hidden" accept=".pdf" />
            </label>
        </div>

        <!-- Settings -->
        <div id="settings-section" class="hidden space-y-6">
            <div id="file-info-container">
                <div class="p-4 border border-[#0000FF] flex items-center justify-between rounded-none">
                    <p id="file-info" class="text-sm truncate"></p>
                    <button id="remove-file-btn" class="ml-4 hover:opacity-50 transition-opacity flex-shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label for="pages-per-booklet" class="block text-sm font-medium mb-1">Pages per booklet</label>
                    <select id="pages-per-booklet" class="mt-1 block w-full bg-white border border-[#0000FF] text-[#0000FF] py-2 px-3 focus:outline-none rounded-none">
                        <option value="0">All pages in one booklet</option>
                        <option value="4">4</option>
                        <option value="8">8</option>
                        <option value="12">12</option>
                        <option value="16" selected>16</option>
                        <option value="20">20</option>
                        <option value="24">24</option>
                    </select>
                </div>
                <!-- Calculation Preview -->
                <div id="calculation-preview" class="hidden pt-2"></div>
            </div>
        </div>

        <!-- Action Button -->
        <div>
            <button id="create-booklet-btn" class="w-full bg-[#0000FF] hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed text-white font-bold py-4 px-4 shadow-none transition-colors flex items-center justify-center text-base rounded-none">
                <span id="btn-text">Select a File</span>
                <div id="spinner" class="spinner hidden ml-3"></div>
            </button>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="message-modal" class="hidden fixed inset-0 bg-white bg-opacity-90 flex items-center justify-center p-4 z-50">
        <div class="bg-white border border-[#0000FF] p-8 max-w-sm w-full text-center rounded-none shadow-xl">
            <p id="modal-message" class="text-lg font-bold"></p>
            <button id="close-modal-btn" class="mt-6 bg-[#0000FF] hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-none">Close</button>
        </div>
    </div>

    <script>
        // --- DOM Element References ---
        const fileInput             = document.getElementById('pdf-file');
        const fileDropLabel         = document.getElementById('file-drop-label');
        const fileInputSection      = document.getElementById('file-input-section');
        const settingsSection       = document.getElementById('settings-section');
        const fileInfo              = document.getElementById('file-info');
        const removeFileBtn         = document.getElementById('remove-file-btn');
        const createBookletBtn      = document.getElementById('create-booklet-btn');
        const pagesPerBookletSelect = document.getElementById('pages-per-booklet');
        const calculationPreview    = document.getElementById('calculation-preview');
        const messageModal          = document.getElementById('message-modal');
        const modalMessage          = document.getElementById('modal-message');
        const closeModalBtn         = document.getElementById('close-modal-btn');
        const btnText               = document.getElementById('btn-text');
        const spinner               = document.getElementById('spinner');

        const { PDFDocument } = PDFLib;
        let originalPdfDoc   = null;
        let originalFileName = '';

        const MAX_FILE_SIZE_MB = 150;

        createBookletBtn.disabled = true;

        // --- Event Listeners ---
        fileInput.addEventListener('change', handleFileSelect);
        removeFileBtn.addEventListener('click', resetUI);
        createBookletBtn.addEventListener('click', processPdf);
        closeModalBtn.addEventListener('click', closeModal);
        pagesPerBookletSelect.addEventListener('change', updateSignatureCalculation);

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        messageModal.addEventListener('click', e => { if (e.target === messageModal) closeModal(); });

        // --- Drag and Drop ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev =>
            fileDropLabel.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }, false)
        );
        ['dragenter', 'dragover'].forEach(ev =>
            fileDropLabel.addEventListener(ev, () => fileDropLabel.classList.add('bg-blue-50'), false)
        );
        ['dragleave', 'drop'].forEach(ev =>
            fileDropLabel.addEventListener(ev, () => fileDropLabel.classList.remove('bg-blue-50'), false)
        );
        fileDropLabel.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files.length) { fileInput.files = files; handleFileSelect({ target: fileInput }); }
        }, false);

        // ─── File Loading ───────────────────────────────────────────────────────────

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.type !== 'application/pdf') {
                showMessage('Please select a valid PDF file.');
                return;
            }
            if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
                showMessage(`File is too large. Please use a PDF under ${MAX_FILE_SIZE_MB} MB.`);
                fileInput.value = '';
                return;
            }

            setLoadingState(true, 'Loading PDF...');
            try {
                const fileBuffer = await file.arrayBuffer();
                originalPdfDoc   = await PDFDocument.load(fileBuffer);
                originalFileName = file.name.replace(/\.pdf$/i, '');

                const pageCount = originalPdfDoc.getPageCount();
                fileInfo.textContent = `${file.name} (${pageCount} pages)`;

                fileInputSection.classList.add('hidden');
                settingsSection.classList.remove('hidden');
                createBookletBtn.disabled = false;
                btnText.textContent = 'Create Booklet';
                updateSignatureCalculation();
            } catch (error) {
                console.error('Error loading PDF:', error);
                showMessage('Could not load PDF. It might be corrupted or password-protected.');
                resetUI();
            } finally {
                setLoadingState(false);
            }
        }

        // ─── Signature Planning ─────────────────────────────────────────────────────

        /**
         * Splits the document into booklet signatures.
         *
         * Every signature's pageIndices array has a length that is a multiple of 4
         * (invariant required by the imposition algorithm).
         *
         * For all booklets except the last one the size equals pagesPerSignature.
         * For the last (partial) booklet, instead of padding it up to
         * pagesPerSignature, we use the SMALLEST multiple of 4 that fits the
         * remaining pages. This eliminates unnecessary blank sheets.
         *
         * Example — 212 pages, 16 per booklet:
         *   Booklets 1–13: 16 pages each, 0 blanks
         *   Booklet 14:    4 pages remaining → sigSize = ceil(4/4)*4 = 4, 0 blanks ✓
         *
         * Without this fix the last booklet would be padded to 16, producing
         * 12 blank half-pages spread across 6 wasted sheets.
         */
        function getSignatures() {
            if (!originalPdfDoc) return [];
            const totalPages = originalPdfDoc.getPageCount();
            let pagesPerSignature = parseInt(pagesPerBookletSelect.value);

            // "All in one": one booklet rounded up to nearest multiple of 4
            if (pagesPerSignature === 0 || pagesPerSignature >= totalPages) {
                const sigSize = Math.ceil(totalPages / 4) * 4;
                const indices = Array.from({ length: sigSize }, (_, j) =>
                    j < totalPages ? j : null
                );
                return [{ displayStart: 1, displayEnd: totalPages, pageIndices: indices }];
            }

            const signatures = [];
            for (let i = 0; i < totalPages; i += pagesPerSignature) {
                const remaining    = totalPages - i;
                const isLastPartial = remaining < pagesPerSignature;

                // Shrink last booklet to smallest multiple of 4 that fits remaining pages
                const sigSize = isLastPartial
                    ? Math.ceil(remaining / 4) * 4
                    : pagesPerSignature;

                const pageIndices = Array.from({ length: sigSize }, (_, j) => {
                    const idx = i + j;
                    return idx < totalPages ? idx : null;
                });

                signatures.push({
                    displayStart: i + 1,
                    displayEnd:   Math.min(i + pagesPerSignature, totalPages),
                    pageIndices,
                });
            }
            return signatures;
        }

        function updateSignatureCalculation() {
            if (!originalPdfDoc) return;
            const signatures = getSignatures();
            if (signatures.length === 0) {
                calculationPreview.classList.add('hidden');
                return;
            }

            let html = `<div class="bg-white p-4 border border-[#0000FF] space-y-2 rounded-none">
                            <h3 class="font-bold text-base">Booklet Plan</h3>`;
            html += signatures.length > 1
                ? `<p class="text-xs opacity-70">This will create a single PDF with ${signatures.length} booklets combined:</p>`
                : `<p class="text-xs opacity-70">This will create a single PDF booklet:</p>`;

            html += '<ul class="text-sm space-y-1">';
            signatures.forEach((sig, i) => {
                const real   = sig.pageIndices.filter(p => p !== null).length;
                const blanks = sig.pageIndices.length - real;
                html += `<li class="flex justify-between items-center">
                            <span>Booklet ${i + 1}:</span>
                            <span class="opacity-60 text-right">
                                pages ${sig.displayStart}–${sig.displayEnd}
                                ${blanks > 0 ? ` (+${blanks} blank)` : ''}
                            </span>
                         </li>`;
            });
            html += '</ul></div>';

            calculationPreview.innerHTML = html;
            calculationPreview.classList.remove('hidden');
        }

        // ─── PDF Generation ─────────────────────────────────────────────────────────

        async function processPdf() {
            if (!originalPdfDoc) { showMessage('Please select a PDF file first.'); return; }
            setLoadingState(true, 'Creating Booklet...');
            try {
                const signatures   = getSignatures();
                const bookletBytes = await createCombinedBooklet(signatures);
                download(bookletBytes, `${originalFileName}_booklet.pdf`, 'application/pdf');
            } catch (error) {
                console.error('Error creating booklet:', error);
                showMessage('An error occurred during booklet creation.');
            } finally {
                setLoadingState(false);
            }
        }

        async function createCombinedBooklet(signatures) {
            const combinedPdf = await PDFDocument.create();
            for (const sig of signatures) {
                const sigBytes    = await createSingleBooklet(sig.pageIndices);
                const sigDoc      = await PDFDocument.load(sigBytes);
                const copiedPages = await combinedPdf.copyPages(sigDoc, sigDoc.getPageIndices());
                copiedPages.forEach(page => combinedPdf.addPage(page));
            }
            return combinedPdf.save();
        }

        /**
         * Builds one booklet from an array of page indices (nulls = blank pages).
         *
         * PRECONDITION: pageIndices.length is a multiple of 4 (guaranteed by getSignatures).
         *
         * Imposition for a booklet of N pages (N is a multiple of 4):
         *   For sheet k (0-based), the four page slots are:
         *     front-left  = index  N-1 - 2k   (last, third-to-last, …)
         *     front-right = index  2k          (first, third, …)
         *     back-left   = index  2k+1        (second, fourth, …)
         *     back-right  = index  N-2 - 2k   (second-to-last, fourth-to-last, …)
         *
         *   Reading order after folding: 0, 1, 2, … N-1  ✓
         *
         * The output PDF page layout:
         *   PDF page 2k+1 = sheet k front  → [front-left | front-right]
         *   PDF page 2k+2 = sheet k back   → [back-left  | back-right ]
         */
        async function createSingleBooklet(pageIndices) {
            const bookletPdf = await PDFDocument.create();

            // Safety-net: pad to multiple of 4 if somehow precondition is violated
            const rem = pageIndices.length % 4;
            const imp = rem === 0
                ? [...pageIndices]
                : [...pageIndices, ...Array(4 - rem).fill(null)];
            const n = imp.length;

            // Build the imposition sequence as flat pairs [left, right] per printed face
            const faces = []; // faces[i] = [leftPageIdx, rightPageIdx]
            for (let k = 0; k < n / 4; k++) {
                const frontLeft  = imp[n - 1 - 2 * k];
                const frontRight = imp[2 * k];
                const backLeft   = imp[2 * k + 1];
                const backRight  = imp[n - 2 - 2 * k];
                faces.push([frontLeft,  frontRight]);   // front face of sheet k
                faces.push([backLeft,   backRight]);    // back  face of sheet k
            }

            // Determine page dimensions from the first real page
            const firstReal = imp.find(p => p !== null);
            if (firstReal === undefined) return bookletPdf.save();

            const { width, height } = originalPdfDoc.getPage(firstReal).getSize();
            const sheetWidth = width * 2;

            // Render each face as one landscape page: [left half | right half]
            for (const [leftIdx, rightIdx] of faces) {
                const sheet = bookletPdf.addPage([sheetWidth, height]);
                if (leftIdx !== null) {
                    const [emb] = await bookletPdf.embedPdf(originalPdfDoc, [leftIdx]);
                    sheet.drawPage(emb, { x: 0, y: 0, width, height });
                }
                if (rightIdx !== null) {
                    const [emb] = await bookletPdf.embedPdf(originalPdfDoc, [rightIdx]);
                    sheet.drawPage(emb, { x: width, y: 0, width, height });
                }
            }

            return bookletPdf.save();
        }

        // ─── UI Helpers ─────────────────────────────────────────────────────────────

        function resetUI() {
            fileInput.value  = '';
            originalPdfDoc   = null;
            originalFileName = '';
            settingsSection.classList.add('hidden');
            fileInputSection.classList.remove('hidden');
            calculationPreview.classList.add('hidden');
            createBookletBtn.disabled = true;
            btnText.textContent = 'Select a File';
        }

        function closeModal() { messageModal.classList.add('hidden'); }

        function showMessage(msg) {
            modalMessage.textContent = msg;
            messageModal.classList.remove('hidden');
        }

        function setLoadingState(isLoading, text = 'Processing...') {
            createBookletBtn.disabled = isLoading;
            removeFileBtn.disabled    = isLoading;
            btnText.textContent = isLoading ? text : (originalPdfDoc ? 'Create Booklet' : 'Select a File');
            spinner.classList.toggle('hidden', !isLoading);
        }

        function download(data, filename, type) {
            const blob = new Blob([data], { type });
            const url  = URL.createObjectURL(blob);
            const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
            a.remove();
        }
    </script>
</body>
</html>
